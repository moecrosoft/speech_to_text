services:
  backend:
    build: ./backend
    ports:
      - '8000:8000'
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: speech
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgresmps10
    depends_on:
      - db
  
  frontend:
    build: ./frontend
    ports: 
      - '8501:8501'
    depends_on:
      - backend

  db: 
    image: postgres:15
    environment:
      POSTGRES_DB: speech
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgresmps10
    volumes:
     - pgdata:/var/lib/postgresql/data
    
volumes:
  pgdata: